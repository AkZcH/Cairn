name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-ingest-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        working-directory: ingest
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp ingest/target/release/cairn-ingest dist/cairn-ingest-linux-x86_64
          cd dist
          sha256sum cairn-ingest-linux-x86_64 > cairn-ingest-linux-x86_64.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cairn-ingest-linux-x86_64
            dist/cairn-ingest-linux-x86_64.sha256

  build-backend-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cairn-backend:latest
            ghcr.io/${{ github.repository_owner }}/cairn-backend:${{ github.ref_name }}
